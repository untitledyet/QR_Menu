<section class="promo-section">
    <h2 class="section-title" data-i18n="promotions">აქციები</h2>
    <div class="promo-grid">
        {% for promotion in promotions %}
        <div class="promo-card" data-promotion-id="{{ promotion.PromotionID }}">
            <div class="promo-card__bg" style="background-image: url('{{ url_for('static', filename='images/promotions/' ~ promotion.BackgroundImage) }}');"></div>
            <div class="promo-card__overlay"></div>
            <div class="promo-card__content">
                <span class="promo-card__badge" data-i18n="promo">აქცია</span>
                <div class="promo-card__title">{{ promotion.PromotionName }}</div>
                <div class="promo-card__desc">{{ promotion.Description }}</div>
            </div>
        </div>
        {% endfor %}
    </div>
</section>
