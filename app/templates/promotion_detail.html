<div class="promo-detail" style="position:relative;">
    <button class="promo-detail__close close-button" aria-label="Close">&times;</button>
    <img class="promo-detail__img" src="{{ url_for('static', filename='images/promotions/' ~ promotion.BackgroundImage) }}" alt="{{ promotion.PromotionName }}">
    <div class="promo-detail__body">
        <div class="promo-detail__title">{{ promotion.PromotionName }}</div>
        <div class="promo-detail__text">{{ promotion.Description }}</div>
        {% if promotion.Discount %}
        <span class="promo-detail__discount">{{ promotion.Discount }}% <span data-i18n="discount">ფასდაკლება</span></span>
        {% endif %}
        <div class="promo-detail__text" style="margin-top:8px;">
            <small>{{ promotion.StartDate }} — {{ promotion.EndDate }}</small>
        </div>
    </div>
</div>
