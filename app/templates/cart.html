<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>კალათი</title>
    {% include 'header.html' %}
</head>
<body data-page="cart" data-venue="{{ session.get('venue_slug', 'demo') }}" data-table="{{ table_id }}">

<div class="app-shell">
    <header class="cart-page__header">
        <a href="{{ url_for('menu_bp.home', slug=session.get('venue_slug','demo'), table_id=table_id) }}" class="cart-page__back">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h1 class="cart-page__title" data-i18n="cart">კალათი</h1>
        <a href="#" class="cart-page__clear trash-icon">
            <i class="fas fa-trash-alt"></i>
        </a>
    </header>

    <main class="cart-content">
        <div class="empty-cart">
            <div class="empty-cart__icon">🛒</div>
            <p class="empty-cart__text" data-i18n="emptyCart">შენი კალათა ცარიელია</p>
            <a href="{{ url_for('menu_bp.home', slug=session.get('venue_slug','demo'), table_id=table_id) }}" class="empty-cart__btn" data-i18n="menu">მენიუ</a>
        </div>
    </main>

    {% include 'navigation.html' %}
</div>

{% include 'item_preorder.html' %}
{% include 'footer.html' %}
</body>
</html>
