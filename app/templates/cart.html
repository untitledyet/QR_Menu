{% extends "base.html" %}

{% block title %}Cart{% endblock %}

{% block css %}
<link href="{{ url_for('static', filename='css/cards.css') }}" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="container mt-5">
    <header class="cart-header d-flex justify-content-between align-items-center mb-4">
        <a href="{{ url_for('menu_bp.home', table_id=table_id) }}" class="btn btn-secondary">Back to Menu</a>
        <h1>Cart</h1>
        <a href="#" class="btn btn-danger trash-icon">
            <i class="fas fa-trash-alt"></i> Clear Cart
        </a>
    </header>

    <main class="cart-content">
        <div class="empty-cart text-center" style="display:none;">
            <img src="/static/images/empty-cart.png" alt="Empty Cart" class="img-fluid mb-3">
            <p>Your cart is empty!</p>
            <a href="{{ url_for('menu_bp.home', table_id=table_id) }}" class="btn btn-primary">Back to Menu</a>
        </div>
    </main>

    <footer class="cart-footer mt-4">
        <a href="{{ url_for('menu_bp.home', table_id=table_id) }}" class="btn btn-secondary">Continue Shopping</a>
        <a href="#" class="btn btn-primary">Checkout</a>
    </footer>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/cart.js') }}"></script>
{% endblock %}
