{% extends "base.html" %}

{% block title %}Item Preorder{% endblock %}

{% block css %}
<link href="{{ url_for('static', filename='css/items.css') }}" rel="stylesheet">
<link href="{{ url_for('static', filename='css/modals.css') }}" rel="stylesheet">
<link href="{{ url_for('static', filename='css/navigation.css') }}" rel="stylesheet">
{% endblock %}

{% block content %}
<!-- Item Details Modal -->
<div class="modal fade" id="item-modal" tabindex="-1" aria-labelledby="itemModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header d-flex justify-content-center align-items-center">
                <h5 class="modal-title" id="itemModalLabel">Vanilla Ice Cream</h5>
            </div>
            <div class="modal-body text-center">
                <img src="" alt="" class="img-fluid rounded mb-3">
                <ul class="list-unstyled">
                    <!-- Ingredients will be dynamically inserted here -->
                </ul>
            </div>
            <div class="modal-footer d-flex justify-content-between align-items-center">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                <a href="#" class="add-to-cart" id="modal-add-to-cart" title="Add to Cart">
                    <img src="/static/images/cart-icon.png" alt="Add to Cart">
                </a>
            </div>
        </div>
    </div>
</div>
{% include 'navigation.html' %}
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/items.js') }}"></script>
<script src="{{ url_for('static', filename='js/navigation.js') }}"></script>
{% endblock %}
