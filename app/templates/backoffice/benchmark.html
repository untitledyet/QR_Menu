<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AI Benchmark</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;padding:32px 24px}
    h1{font-size:1.5rem;font-weight:700;margin-bottom:4px;color:#fff}
    .subtitle{font-size:.85rem;color:#64748b;margin-bottom:32px}
    .card{background:#1e2130;border:1px solid #2d3348;border-radius:12px;padding:24px;margin-bottom:24px}
    .card h2{font-size:1rem;font-weight:600;color:#94a3b8;margin-bottom:16px;text-transform:uppercase;letter-spacing:.05em}
    .tabs{display:flex;gap:8px;margin-bottom:24px}
    .tab{padding:8px 20px;border-radius:8px;border:1px solid #2d3348;background:transparent;color:#94a3b8;cursor:pointer;font-size:.875rem;transition:all .15s}
    .tab.active{background:#6c63ff;border-color:#6c63ff;color:#fff}
    label{display:block;font-size:.8rem;color:#94a3b8;margin-bottom:6px;margin-top:16px}
    label:first-child{margin-top:0}
    textarea,input[type=text]{width:100%;background:#0f1117;border:1px solid #2d3348;border-radius:8px;color:#e2e8f0;padding:10px 12px;font-size:.875rem;resize:vertical;outline:none}
    textarea:focus,input[type=text]:focus{border-color:#6c63ff}
    .upload-area{border:2px dashed #2d3348;border-radius:8px;padding:24px;text-align:center;cursor:pointer;transition:border-color .15s;position:relative}
    .upload-area:hover,.upload-area.drag{border-color:#6c63ff}
    .upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer}
    .upload-area p{font-size:.85rem;color:#64748b}
    .upload-area .fname{color:#e2e8f0;margin-top:8px;font-size:.8rem}
    #preview-img{max-height:160px;border-radius:8px;margin-top:12px;display:none}
    .run-btn{display:flex;align-items:center;gap:10px;margin-top:24px;padding:12px 28px;background:#6c63ff;border:none;border-radius:8px;color:#fff;font-size:.9rem;font-weight:600;cursor:pointer;transition:opacity .15s}
    .run-btn:hover{opacity:.85}
    .run-btn:disabled{opacity:.4;cursor:not-allowed}
    .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Results */
    .results-grid{display:grid;gap:16px}
    .results-grid.cols-2{grid-template-columns:1fr 1fr}
    .results-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
    @media(max-width:900px){.results-grid.cols-2,.results-grid.cols-3{grid-template-columns:1fr}}
    .result-card{background:#0f1117;border:1px solid #2d3348;border-radius:10px;padding:16px;position:relative}
    .result-card.ok{border-color:#22c55e22}
    .result-card.err{border-color:#ef444422}
    .result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .provider-name{font-weight:600;font-size:.875rem}
    .badge{font-size:.72rem;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap}
    .badge.ok{background:#15803d33;color:#4ade80}
    .badge.err{background:#7f1d1d33;color:#f87171}
    .badge.loading{background:#1e3a5f33;color:#60a5fa}
    .time-badge{font-size:.75rem;color:#64748b;padding:2px 8px;border:1px solid #2d3348;border-radius:20px}
    .result-img{width:100%;border-radius:8px;display:block}
    .result-note{font-size:.72rem;color:#64748b;margin-top:8px;font-style:italic}
    .result-text{font-size:.78rem;line-height:1.6;color:#cbd5e1;white-space:pre-wrap;word-break:break-word;max-height:320px;overflow-y:auto;background:#0a0d14;padding:12px;border-radius:6px}
    .error-msg{font-size:.8rem;color:#f87171;background:#7f1d1d22;padding:10px 12px;border-radius:6px}
    .section-title{font-size:.95rem;font-weight:600;color:#94a3b8;margin:28px 0 12px;text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:8px}
    .section-title::after{content:'';flex:1;height:1px;background:#2d3348}
    .hidden{display:none}
    #results{margin-top:12px}
    .skeleton{background:linear-gradient(90deg,#1e2130 25%,#2d3348 50%,#1e2130 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px;height:200px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  </style>
</head>
<body>
<h1>⚡ AI Benchmark</h1>
<p class="subtitle">GPT vs Google — image generation &amp; OCR side-by-side, parallel execution</p>

<div class="card">
  <h2>Mode</h2>
  <div class="tabs">
    <button class="tab active" data-mode="both">Both</button>
    <button class="tab" data-mode="generate">Image Generation only</button>
    <button class="tab" data-mode="ocr">OCR only</button>
  </div>

  <div id="section-generate">
    <label>Prompt (Image Generation)</label>
    <textarea id="prompt" rows="3" placeholder="e.g. A plate of Georgian khinkali dumplings, studio food photography, dark background"></textarea>
  </div>

  <div id="section-ocr">
    <label>Image for OCR (upload a menu photo)</label>
    <div class="upload-area" id="drop-zone">
      <input type="file" id="file-input" accept="image/*">
      <p>Drop image here or click to upload</p>
      <p class="fname" id="file-name"></p>
    </div>
    <img id="preview-img" alt="preview">
  </div>

  <button class="run-btn" id="run-btn">
    <div class="spinner" id="spinner"></div>
    <span id="run-label">Run Benchmark</span>
  </button>
</div>

<div id="results" class="hidden"></div>

<script>
let mode = 'both';
let imageB64 = '';
let imageMime = 'image/jpeg';

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    mode = t.dataset.mode;
    document.getElementById('section-generate').style.display = mode === 'ocr' ? 'none' : '';
    document.getElementById('section-ocr').style.display = mode === 'generate' ? 'none' : '';
  });
});

const fileInput = document.getElementById('file-input');
const dropZone = document.getElementById('drop-zone');
const previewImg = document.getElementById('preview-img');

function loadFile(file) {
  if (!file) return;
  document.getElementById('file-name').textContent = file.name;
  imageMime = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    imageB64 = dataUrl.split(',')[1];
    previewImg.src = dataUrl;
    previewImg.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

fileInput.addEventListener('change', () => loadFile(fileInput.files[0]));
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag');
  loadFile(e.dataTransfer.files[0]);
});

document.getElementById('run-btn').addEventListener('click', runBenchmark);

function runBenchmark() {
  const prompt = document.getElementById('prompt').value.trim();
  if (mode !== 'ocr' && !prompt) { alert('Enter a prompt for image generation.'); return; }
  if (mode !== 'generate' && !imageB64) { alert('Upload an image for OCR.'); return; }

  const btn = document.getElementById('run-btn');
  const spinner = document.getElementById('spinner');
  const label = document.getElementById('run-label');
  btn.disabled = true;
  spinner.style.display = 'block';
  label.textContent = 'Running…';

  // Show skeletons
  const resultsEl = document.getElementById('results');
  resultsEl.classList.remove('hidden');
  resultsEl.innerHTML = buildSkeletons();

  fetch('/backoffice/benchmark/run', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ mode, prompt, image_b64: imageB64, image_mime: imageMime }),
  })
  .then(r => r.json())
  .then(data => renderResults(data, prompt))
  .catch(err => {
    resultsEl.innerHTML = `<p style="color:#f87171">Error: ${err}</p>`;
  })
  .finally(() => {
    btn.disabled = false;
    spinner.style.display = 'none';
    label.textContent = 'Run Benchmark';
  });
}

function buildSkeletons() {
  let html = '';
  if (mode !== 'ocr') {
    html += '<div class="section-title">Image Generation</div>';
    html += '<div class="results-grid cols-2">';
    html += '<div class="result-card"><div class="skeleton"></div></div>';
    html += '<div class="result-card"><div class="skeleton"></div></div>';
    html += '</div>';
  }
  if (mode !== 'generate') {
    html += '<div class="section-title">OCR — Text Extraction</div>';
    html += '<div class="results-grid cols-3">';
    html += '<div class="result-card"><div class="skeleton"></div></div>';
    html += '<div class="result-card"><div class="skeleton"></div></div>';
    html += '<div class="result-card"><div class="skeleton"></div></div>';
    html += '</div>';
  }
  return html;
}

function ms(t) {
  return t >= 1000 ? (t/1000).toFixed(1) + 's' : t + 'ms';
}

function resultCard(title, data) {
  if (!data) return '';
  const ok = data.ok;
  const timeBadge = `<span class="time-badge">⏱ ${ms(data.time_ms)}</span>`;
  let body = '';
  if (!ok) {
    body = `<div class="error-msg">✗ ${escHtml(data.error || 'Unknown error')}</div>`;
  } else if (data.image) {
    body = `<img class="result-img" src="${data.image}" alt="generated">`;
    if (data.note) body += `<p class="result-note">${escHtml(data.note)}</p>`;
  } else if (data.text !== undefined) {
    body = `<div class="result-text">${escHtml(data.text)}</div>`;
  }
  return `
    <div class="result-card ${ok ? 'ok' : 'err'}">
      <div class="result-header">
        <span class="provider-name">${title}</span>
        <div style="display:flex;gap:6px;align-items:center">
          ${timeBadge}
          <span class="badge ${ok ? 'ok' : 'err'}">${ok ? '✓ OK' : '✗ ERR'}</span>
        </div>
      </div>
      ${body}
    </div>`;
}

function renderResults(data, prompt) {
  let html = '';
  if (mode !== 'ocr') {
    html += '<div class="section-title">Image Generation</div>';
    html += `<div class="results-grid cols-2">`;
    html += resultCard('DALL-E 3 (OpenAI)', data.gen_dalle);
    html += resultCard('Imagen 4 (Google)', data.gen_imagen);
    html += '</div>';
  }
  if (mode !== 'generate') {
    html += '<div class="section-title">OCR — Text Extraction</div>';
    html += '<div class="results-grid cols-3">';
    html += resultCard('GPT-4o (OpenAI)', data.ocr_gpt);
    html += resultCard('Gemini 2.0 Flash', data.ocr_gemini);
    html += resultCard('Cloud Vision', data.ocr_vision);
    html += '</div>';
  }
  document.getElementById('results').innerHTML = html;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
