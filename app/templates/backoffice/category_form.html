{% extends 'backoffice/base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="bo-header">
    <h1>{{ title }}</h1>
    <a href="{{ url_for('bo_bp.categories_list') }}" class="bo-btn bo-btn--ghost"><i class="fas fa-arrow-left"></i> Back</a>
</div>

<form method="POST" enctype="multipart/form-data" style="max-width:500px;">
    <div class="bo-form-group">
        <label>Category Name *</label>
        <input type="text" name="name" value="{{ category.CategoryName if category else '' }}" required placeholder="e.g. Burgers">
    </div>
    <div class="bo-form-group">
        <label>Description</label>
        <input type="text" name="description" value="{{ category.Description if category else '' }}" placeholder="Short description">
    </div>
    <div class="bo-form-group">
        <label>Icon Image</label>
        {% if category and category.CategoryIcon %}
        <div style="margin-bottom:8px;">
            <img src="{{ url_for('static', filename='images/categories/' ~ category.CategoryIcon) }}" style="width:60px; height:60px; border-radius:8px; object-fit:cover;">
        </div>
        {% endif %}
        <input type="file" name="icon" accept="image/*">
    </div>
    <div class="bo-form-actions">
        <a href="{{ url_for('bo_bp.categories_list') }}" class="bo-btn bo-btn--ghost">Cancel</a>
        <button type="submit" class="bo-btn bo-btn--primary"><i class="fas fa-check"></i> {{ 'Save' if category else 'Create' }}</button>
    </div>
</form>
{% endblock %}
