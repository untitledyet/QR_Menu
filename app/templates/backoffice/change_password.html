{% extends 'backoffice/base.html' %}
{% block title %}პაროლის შეცვლა{% endblock %}
{% block content %}
<div class="bo-header">
    <h1>პაროლის შეცვლა</h1>
</div>

{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="bo-alert bo-alert--{{ 'success' if 'წარმატებით' in messages[0] else 'error' }}" style="margin-bottom:16px;">
    {{ messages[0] }}
</div>
{% endif %}
{% endwith %}

<div class="bo-card" style="max-width:420px;">
    <form method="POST" style="display:flex;flex-direction:column;gap:16px;">
        <div class="bo-form-group">
            <label>მიმდინარე პაროლი</label>
            <input type="password" name="current_password" required class="bo-input">
        </div>
        <div class="bo-form-group">
            <label>ახალი პაროლი</label>
            <input type="password" name="new_password" required minlength="8" class="bo-input">
        </div>
        <div class="bo-form-group">
            <label>გაიმეორეთ ახალი პაროლი</label>
            <input type="password" name="confirm_password" required minlength="8" class="bo-input">
        </div>
        <button type="submit" class="bo-btn bo-btn--primary">შეცვლა</button>
        <a href="{{ url_for('bo_bp.dashboard') }}" class="bo-btn bo-btn--ghost" style="text-align:center;">გაუქმება</a>
    </form>
</div>
{% endblock %}
