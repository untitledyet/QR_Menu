<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Backoffice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/backoffice.css') }}">
</head>
<body class="bo-login-page">
    <div class="bo-login-card">
        <div class="bo-login-card__icon"><i class="fas fa-utensils"></i></div>
        <h1 class="bo-login-card__title">QR Menu Backoffice</h1>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="bo-login-card__error">{{ messages[0] }}</div>
        {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="bo-form-group">
                <label>Username</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="bo-form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="bo-btn bo-btn--primary bo-btn--full">Sign In</button>
        </form>
    </div>
</body>
</html>
