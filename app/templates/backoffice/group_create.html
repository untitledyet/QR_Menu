{% extends 'backoffice/base.html' %}
{% block title %}ჯაჭვის შექმნა{% endblock %}
{% block content %}
<div class="bo-header">
    <h1>ჯაჭვის შექმნა</h1>
    <p class="bo-header__sub">{{ admin.venue.name }} გახდება ჯაჭვის პირველი ფილიალი და მფლობელი</p>
</div>

<form method="POST" style="max-width:480px;" action="{{ url_for('group_bp.create_group') }}">
    <div class="bo-form-group">
        <label class="bo-label">ჯაჭვის სახელი *</label>
        <input type="text" name="group_name" class="bo-input"
               placeholder="მაგ: პაულანერი" required autofocus>
        <small class="bo-form-hint">ეს სახელი ჩანს ყველა ფილიალის ბექოფისში</small>
    </div>

    <div style="display:flex;gap:12px;margin-top:20px;">
        <button type="submit" class="bo-btn bo-btn--primary">
            <i class="fas fa-check"></i> ჯაჭვის შექმნა
        </button>
        <a href="{{ url_for('group_bp.group_dashboard') }}" class="bo-btn bo-btn--ghost">გაუქმება</a>
    </div>
</form>
{% endblock %}
