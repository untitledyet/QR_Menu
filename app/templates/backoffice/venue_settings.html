{% extends 'backoffice/base.html' %}
{% block title %}Venue Settings{% endblock %}
{% block content %}
<div class="bo-header">
    <h1>Venue Settings</h1>
    <p class="bo-header__sub">{{ venue.name }}</p>
</div>

<form method="POST" style="max-width:480px;">
    <div class="bo-form-group">
        <label class="bo-label">Total Tables (QR Menu)</label>
        <input type="number" name="total_tables" class="bo-input" min="0" value="{{ venue.total_tables or 0 }}"
               placeholder="0 = unlimited">
        <p style="font-size:.78rem; color:var(--bo-muted); margin-top:4px;">
            How many physical tables does your venue have? Menu links <code>/table/1</code> through <code>/table/N</code> will work.
            Set to 0 for unlimited access.
        </p>
    </div>
    <button type="submit" class="bo-btn bo-btn--primary" style="margin-top:16px;">
        <i class="fas fa-save"></i> Save
    </button>
</form>
{% endblock %}
