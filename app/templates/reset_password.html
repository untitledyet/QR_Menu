<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tably — პაროლის აღდგენა</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/landing.css') }}">
    <style>
        .reset-card {
            max-width: 420px;
            margin: 0 auto;
            padding: 40px 32px;
            background: var(--t-surface, #fff);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .reset-card h2 { color: #FF6B35; margin-bottom: 8px; }
        .reset-card p { color: var(--t-text-2, #666); margin-bottom: 24px; }
        .reset-card input {
            width: 100%; padding: 12px 16px; border: 1.5px solid #ddd;
            border-radius: 8px; font-size: 15px; box-sizing: border-box; margin-bottom: 12px;
        }
        .reset-card input:focus { outline: none; border-color: #FF6B35; }
        .btn-primary {
            width: 100%; padding: 13px; background: #FF6B35; color: #fff;
            border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
            cursor: pointer;
        }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .msg { margin-top: 14px; font-size: 14px; text-align: center; }
        .msg.error { color: #e53e3e; }
        .msg.success { color: #38a169; }
    </style>
</head>
<body>
<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;">
    {% if not valid %}
    <div class="reset-card" style="text-align:center;">
        <div style="font-size:3rem;margin-bottom:16px;">❌</div>
        <h2>ლინკი არასწორია</h2>
        <p>პაროლის აღდგენის ლინკი ვადაგასულია ან არასწორია.</p>
        <a href="/" style="color:#FF6B35;text-decoration:none;font-weight:600;">← მთავარ გვერდზე</a>
    </div>
    {% else %}
    <div class="reset-card">
        <h2>პაროლის შეცვლა</h2>
        <p>შეიყვანეთ ახალი პაროლი თქვენი ანგარიშისთვის.</p>
        <form id="resetForm">
            <input type="password" id="password" placeholder="ახალი პაროლი (მინ. 8 სიმბოლო)" required minlength="8">
            <input type="password" id="password2" placeholder="გაიმეორეთ პაროლი" required minlength="8">
            <button type="submit" class="btn-primary" id="submitBtn">პაროლის შეცვლა</button>
        </form>
        <div id="msg" class="msg"></div>
    </div>
    <script>
        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const pw = document.getElementById('password').value;
            const pw2 = document.getElementById('password2').value;
            const msg = document.getElementById('msg');
            const btn = document.getElementById('submitBtn');

            if (pw !== pw2) {
                msg.className = 'msg error';
                msg.textContent = 'პაროლები არ ემთხვევა';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'იგზავნება...';

            const res = await fetch(window.location.pathname, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({password: pw})
            });
            const data = await res.json();

            if (data.success) {
                msg.className = 'msg success';
                msg.textContent = data.message;
                document.getElementById('resetForm').style.display = 'none';
                setTimeout(() => window.location.href = '/', 2500);
            } else {
                msg.className = 'msg error';
                msg.textContent = data.error || 'შეცდომა';
                btn.disabled = false;
                btn.textContent = 'პაროლის შეცვლა';
            }
        });
    </script>
    {% endif %}
</div>
</body>
</html>
